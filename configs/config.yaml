project:
  name: CardioWatch
  seed: 42

data:
  raw_dir: data/raw
  processed_dir: data/processed

preprocessing:
  ecg:
    bandpass_low_hz: 0.5
    bandpass_high_hz: 100.0
    sampling_rate_hz: 500
    window_minutes: 5
  clinical:
    imputation_strategy: median
  smote:
    random_state: 42
    k_neighbors: 5

models:
  random_forest:
    n_estimators: 200
    max_depth: 10
    class_weight: balanced
    random_state: 42
  xgboost:
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.05
    scale_pos_weight: 5
    random_state: 42
  cnn_lstm:
    cnn_filters: [32, 64]
    cnn_kernel_size: 7
    lstm_hidden_size: 128
    lstm_layers: 2
    dropout: 0.3
    epochs: 50
    batch_size: 64
    learning_rate: 0.001

evaluation:
  cv_folds: 5
  target_recall: 0.90
  lead_time_minutes: 30